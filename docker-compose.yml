version: '3.4'

services:
  bookify.api:
    image: ${DOCKER_REGISTRY-}bookifyapi
    build:
      context: .
      dockerfile: src/Bookify.Api/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
    - bookify-db

  bookify-db:
    image: postgres:latest
    container_name: Bookify.Db
    environment:
      - POSTGRES_DB=bookify
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql/data
    ports:
      - 5432:5432
  # bookify-idp:
  #   build:
  #     context: .
  #     dockerfile: ./keycloack-dockerfile
  #   container_name: Bookify.Identity
  #   environment:
  #     # - KEYCLOAK_USER=admin
  #     # - KEYCLOAK_PASSWORD=admin
  #     - KEYCLOAK_IMPORT=/tmp/bookify-realm-export.json
  #   volumes:
  #     - ./.containers/identity:/opt/jboss/keycloak/standalone/data
  #     - ./.files/bookify-realm-export.json:/tmp/bookify-realm-export.json
  #   ports:
  #     - 18080:8080
  #     - 8443:8443
  bookify-idp:
    image: quay.io/keycloak/keycloak:latest
    container_name: Bookify.Identity
    command: start-dev --import-realm
    environment:
    - KEYCLOAK_ADMIN=admin
    - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
    - ./.containers/identity:/opt/keycloak/data
    - ./.files/bookify-realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
    - 18080:8080